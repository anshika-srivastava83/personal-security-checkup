<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Security Checkup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1d242e;
      color: #e6edf3;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }
    .card {
      background: #28323b;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #121821;
      color: white;
      box-sizing: border-box;
    }
    #strengthBar {
      height: 5px;
      border-radius: 10px;
      margin-top: 10px;
      transition: 0.3s;
      width: 0%;
    }
    #strengthText {
      margin-top: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🛡️ Password Strength Checker</h2>
    <input type="text" id="passwordInput" placeholder="Type a password..." maxlength = "64">
    <div id="strengthBar"></div>
    <div id="strengthText"></div>
  </div>

  <script>
    const input = document.getElementById("passwordInput");
    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");

    input.addEventListener("input", () => {
      const password = input.value;
      if(password.length===0){
        bar.style.width = "0%";
        text.textContent = "";
      }else if (isCommonPassword(password)){
        bar.style.width = "100%";
        bar.style.background = "red";
        text.textContent = "Very weak - Common Password!";
      }
      else{
      const score = checkStrength(password);
      updateDisplay(score);
    }});

    function checkStrength(password) {
      let score = 0;
      if (password.length < 4) score = 0;
      else{
       if (password.length >= 8) score++;
       if (password.length >= 12) score++;
       if (/[a-z]/.test(password)) score++;
       if (/[A-Z]/.test(password)) score++;
       if (/[0-9]/.test(password)) score++;
       if (/[^A-Za-z0-9]/.test(password)) score++;
       if (!/(.)\1\1/.test(password)) score++;
      }
      return score;
    }

    const commonPasswords = [
      "password", "password123", "123456", "123456789", "qwerty",
      "abc123", "letmein", "monkey", "111111", "iloveyou", "000000",
      "admin", "welcome", "qwerty123", "password1", "12345678"
    ];

    function isCommonPassword(password) {
      return commonPasswords.includes(password.toLowerCase());
    }

    function updateDisplay(score) {
      const percent = (score / 7) * 100;
      bar.style.width = percent + "%";

      if (score <= 2) {
        bar.style.background = "red";
        text.textContent = "Weak";
      } else if (score <= 4) {
        bar.style.background = "orange";
        text.textContent = "Moderate";
      } else {
        bar.style.background = "limegreen";
        text.textContent = "Strong";
      }
    }
  </script>

</body>
</html>
