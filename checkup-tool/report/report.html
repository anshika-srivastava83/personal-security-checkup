<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Security Report</title>
    <link rel="stylesheet" href="report.css">
</head>

<body>

    <div class="report-container">
        <h1>Your Security Report</h1>
        <div id="overallConclusion" class="overall-box"></div>

        <div class="report-section">
            <h2>Digital Footprint</h2>
            <div id="footprintChart" class="chart-area"></div>
            <div class="pros-cons-row">
                <div class="pros-col">
                    <div class="col-label">Strengths</div>
                    <ul id="footprintPros" class="points-list"></ul>
                </div>
                <div class="cons-col">
                    <div class="col-label">Watch out for</div>
                    <ul id="footprintCons" class="points-list"></ul>
                </div>
            </div>
            <div id="footprintConclusion" class="section-conclusion"></div>
        </div>

        <div class="report-section">
            <h2>Password Strength</h2>
            <div id="passwordChart" class="chart-area"></div>
            <div class="pros-cons-row">
                <div class="pros-col">
                    <div class="col-label">Strengths</div>
                    <ul id="passwordPros" class="points-list"></ul>
                </div>
                <div class="cons-col">
                    <div class="col-label">Watch out for</div>
                    <ul id="passwordCons" class="points-list"></ul>
                </div>
            </div>
            <div id="passwordConclusion" class="section-conclusion"></div>
        </div>

        <a href="../index.html" class="back-link">← Back to Checkup</a>
    </div>

    <script src="report.js"></script>
</body>

</html>
