<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Security Report</title>
    <link rel="stylesheet" href="report.css">
</head>

<body>

    <div class="report-container">
        <h1>Your Security Report</h1>
        <div id="overallConclusion" class="overall-box"></div>

        <div class="report-section">
            <h2>Digital Footprint</h2>
            <div id="footprintChart" class="chart-area"></div>
            <table class="pros-cons-table">
                <thead>
                    <tr>
                        <th class="pros-header">Strengths</th>
                        <th class="cons-header">Watch out for</th>
                    </tr>
                </thead>
                <tbody id="footprintTableBody"></tbody>
            </table>
            <div id="footprintConclusion" class="section-conclusion"></div>
        </div>

        <div class="report-section">
            <h2>Password Strength</h2>
            <div id="passwordChart" class="chart-area"></div>
            <table class="pros-cons-table">
                <thead>
                    <tr>
                        <th class="pros-header">Strengths</th>
                        <th class="cons-header">Watch out for</th>
                    </tr>
                </thead>
                <tbody id="passwordTableBody"></tbody>
            </table>
            <div id="passwordConclusion" class="section-conclusion"></div>
        </div>

        <a href="../index.html" class="back-link">← Back to Checkup</a>
    </div>

    <script src="report.js"></script>
</body>

</html>
